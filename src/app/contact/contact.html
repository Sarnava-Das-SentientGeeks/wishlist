<form class="container p-5">
    <div class="mb-3">
        <label for="" class="form-label">Your Name</label>
        <input type="text" class="form-control" formControlName="senderNameControl">
    </div>

     <div class="mb-3">
        <label for="" class="form-label">Your Email</label>
        <input type="email" class="form-control" formControlName = "senderEmailControl">
    </div>

    <div class="mb-3">
        <label for="" class="form-label">Message</label>
        <textarea class="form-control" rows="3" formControlName="senderMessageControl"></textarea>
    </div>

    <div class="mb-3">
       <button class="btn btn-primary" type="submit">Send Message</button>
    </div>
</form>
