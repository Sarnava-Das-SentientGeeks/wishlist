 <form class="row mt-3 gx-3 align-items-center justify-content-center">
    <div class="col-sm-6">
          <label for="name">
          Wish  <input type = "text" [(ngModel)]="newWishName" name="name"/>
        </label>
    </div>      
    <div class="class col-auto">
        <button type = "submit" class = "btn btn-primary" (click)="$event.preventDefault(); addNewWish();">Add Wish</button>
    </div>
  </form>
