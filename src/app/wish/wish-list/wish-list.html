<div class="row mt-3">
        
  <ul class = "wish-list">
    @for(wish of wishes(); track wish.id;let idx = $index,e=$even)
    {
    <wish-list-item [wishText]="wish.wishText" [wishId]="idx" [(wishFulfill)]="wish.isComplete"> </wish-list-item>
    }
       
    @empty {
        <li>There are no items.</li>
      }  
  </ul> 
</div>
